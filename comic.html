<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE範文漫畫館</title>
    
    <style>
        /* =========================================
           漫畫風 CSS 變數與全域設定
           ========================================= */
        :root {
            --comic-black: #111;
            --comic-white: #fdfdfd;
            --comic-grey: #e0e0e0;
            --comic-yellow: #ffcc00;
            --comic-red: #e63946;
            --comic-border: 4px solid var(--comic-black);
            --comic-shadow: 6px 6px 0px var(--comic-black);
            --comic-shadow-hover: 10px 10px 0px var(--comic-black);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang HK", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background-color: var(--comic-white);
            background-image: radial-gradient(#ccc 15%, transparent 16%), radial-gradient(#ccc 15%, transparent 16%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            color: var(--comic-black);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 頂部導航欄 */
        header {
            background-color: var(--comic-white);
            border-bottom: var(--comic-border);
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0px rgba(0,0,0,1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; flex: 1; justify-content: flex-start; }
        .header-right { display: flex; flex: 1; justify-content: flex-end; }

        .logo {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--comic-black);
            color: var(--comic-white);
            padding: 8px 20px;
            transform: skew(-5deg);
            text-align: center;
            white-space: nowrap;
            flex: 0 1 auto;
            margin: 0 10px;
        }

        .btn {
            background-color: var(--comic-white);
            color: var(--comic-black);
            border: 3px solid var(--comic-black);
            padding: 8px 15px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px var(--comic-black);
            font-family: inherit;
        }

        .btn:hover { background-color: var(--comic-yellow); transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--comic-black); }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--comic-black); }

        /* --- 搜尋列 UI --- */
        #search-container { position: relative; display: flex; align-items: center; }
        
        #search-input {
            padding: 8px 15px; font-size: 16px; font-weight: 900; border: 3px solid var(--comic-black);
            border-radius: 20px; outline: none; box-shadow: 2px 2px 0 var(--comic-black);
            transition: all 0.3s; width: 200px; box-sizing: border-box; background: var(--comic-white);
        }
        #search-input:focus { box-shadow: 4px 4px 0 var(--comic-black); transform: translate(-2px, -2px); width: 250px; background: #fffde7; }

        #search-results {
            position: absolute; top: 45px; right: 0; width: 320px; background: var(--comic-white);
            border: 3px solid var(--comic-black); box-shadow: 4px 4px 0 var(--comic-black); border-radius: 8px;
            display: none; z-index: 1000; max-height: 60vh; overflow-y: auto; text-align: left;
        }
        .search-item { padding: 12px 15px; border-bottom: 2px solid var(--comic-black); cursor: pointer; font-size: 15px; line-height: 1.4; color: #333; }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: var(--comic-yellow); color: var(--comic-black); }
        .search-item strong { display: block; margin-bottom: 5px; font-size: 16px; color: var(--comic-black); }
        .highlight { color: var(--comic-red); background: var(--comic-yellow); padding: 0 2px; border-radius: 3px; font-weight: bold; }

        /* 主視圖容器 */
        main {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; width: 100%; box-sizing: border-box;
        }

        /* --- 漫畫目錄 UI --- */
        #catalog-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 40px; width: 100%; max-width: 1200px; }

        .comic-card {
            border: var(--comic-border); box-shadow: var(--comic-shadow); background: var(--comic-white);
            cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; position: relative;
        }
        .comic-card:hover:not(.disabled) { transform: translateY(-8px) scale(1.02); box-shadow: var(--comic-shadow-hover); }
        .comic-card.disabled { cursor: not-allowed; filter: grayscale(100%); opacity: 0.8; }

        .comic-cover { width: 100%; height: 350px; border-bottom: var(--comic-border); background-color: var(--comic-grey); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .comic-cover img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .comic-info { padding: 15px; text-align: center; background: var(--comic-white); }
        .comic-title { font-size: 22px; font-weight: 900; margin: 0 0 5px 0; }
        .comic-meta { font-size: 14px; font-weight: bold; color: #555; }
        
        .badge { position: absolute; top: -15px; right: -15px; background: var(--comic-yellow); border: 3px solid var(--comic-black); padding: 8px 15px; font-weight: 900; font-size: 16px; transform: rotate(12deg); box-shadow: 4px 4px 0 var(--comic-black); z-index: 2; }
        .badge.coming-soon { background: var(--comic-grey); color: #555; }

        /* --- 閱讀器 UI (垂直滾動版) --- */
        #reader-view { width: 100%; display: none; flex-direction: column; align-items: center; padding-bottom: 120px; }
        #book-wrapper { width: 100%; display: flex; justify-content: center; }
        #book { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; max-width: 900px; }

        .page {
            width: 100%; background-color: var(--comic-white); border: var(--comic-border);
            box-shadow: var(--comic-shadow); display: flex; flex-direction: column; box-sizing: border-box; 
            position: relative; scroll-margin-top: 100px; min-height: 400px;
        }

        .page-content { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: var(--comic-white); }
        .page-content img { width: 100%; height: auto; object-fit: contain; user-select: none; -webkit-user-drag: none; cursor: zoom-in; padding: 10px; box-sizing: border-box; display: block; }
        .page-text {
            width: 100%; background: var(--comic-white); border-top: 3px solid var(--comic-black);
            padding: 15px 20px; font-size: 18px; font-weight: 900; line-height: 1.6; text-align: justify; z-index: 5; box-sizing: border-box;
            transition: background-color 0.5s;
        }

        /* 底部浮動控制欄 */
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center; flex-wrap: nowrap; white-space: nowrap; gap: 15px; 
            background: var(--comic-white); padding: 12px 25px; border: var(--comic-border); box-shadow: var(--comic-shadow); z-index: 100; border-radius: 30px;
        }

        .page-info { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 5px; }
        #page-input {
            width: 50px; text-align: center; font-size: 18px; font-weight: 900;
            border: 2px solid var(--comic-black); border-radius: 4px; padding: 4px; outline: none; background-color: var(--comic-white);
        }
        #page-input:focus { background-color: #eee; }
        #page-input::-webkit-outer-spin-button, #page-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border: 5px solid var(--comic-white); box-shadow: 0 0 20px rgba(0,0,0,0.8); }

        #loading {
            position: fixed; font-size: 24px; font-weight: bold; background: var(--comic-yellow); border: var(--comic-border);
            padding: 20px 40px; box-shadow: var(--comic-shadow); z-index: 2000; display: none; transform: rotate(-3deg); top: 30%; left: 50%; margin-left: -120px;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; padding: 10px; }
            .header-left { position: absolute; left: 10px; top: 15px; width: auto; z-index: 10; flex: none; }
            .logo { font-size: 18px; padding: 5px 15px; margin-top: 5px; order: 1;}
            .header-right { width: 100%; justify-content: center; order: 2;}
            
            #search-container { width: 100%; }
            #search-input { width: 100%; max-width: 100%; }
            #search-input:focus { width: 100%; transform: translate(0, -2px); }
            #search-results { width: 95vw; left: 50%; transform: translateX(-50%); right: auto; top: 45px; }

            .btn { padding: 6px 10px; font-size: 14px; box-shadow: 2px 2px 0px var(--comic-black); }
            #catalog-view { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 0; }
            .comic-cover { height: 220px; }
            .comic-title { font-size: 16px; }
            .badge { font-size: 12px; padding: 4px 8px; top: -8px; right: -8px; }
            
            .controls { padding: 10px 15px; gap: 10px; width: 90%; max-width: 400px; box-sizing: border-box; }
            .page-text { font-size: 16px; padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button id="btn-back" class="btn" style="display: none;">◄ 返回目錄</button>
        </div>
        <div class="logo">DSE 範文漫畫館</div>
        <div class="header-right">
            <!-- 新增搜尋框 -->
            <div id="search-container">
                <input type="text" id="search-input" placeholder="搜尋內文..." autocomplete="off">
                <div id="search-results"></div>
            </div>
        </div>
    </header>

    <main>
        <div id="loading">正在讀取漫畫...</div>

        <!-- 主頁：漫畫目錄 UI -->
        <div id="catalog-view"></div>

        <!-- 內頁：漫畫閱讀器 (垂直滾動) -->
        <div id="reader-view">
            <div id="book-wrapper">
                <div id="book"></div>
            </div>

            <!-- 底部控制列 -->
            <div class="controls">
                <button class="btn" id="btn-prev">▲ 上一頁</button>
                <div class="page-info">
                    第 <input type="number" id="page-input" value="1" min="1"> / <span id="total-pages">1</span> 頁
                </div>
                <button class="btn" id="btn-next">下一頁 ▼</button>
            </div>
        </div>
    </main>

    <!-- 圖片放大遮罩層 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="放大觀看">
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwvrHGW-m-UpVfvhc-rg2Rjo_tySA8XML5pGovWgGOdNvds83OihWlCOAh0Qte1GumHFA/exec";

                    "先帝創業未半而中道崩殂，", "今天下三分，益州疲弊，此誠危急存亡之秋也。", "然侍衛之臣不懈於內，忠志之士忘身於外者，",

                texts:[

            },
               "yueyanglouji": { 
                title: "《岳陽樓記》", author: "范仲淹", folderId: "1ZIW5BsMvthRxr0ecWxXMrHXu6F2exV83", folder: "《岳陽樓記》", totalPages: 33, 
                texts:[
                    "慶曆四年春，滕子京謫守巴陵郡。", 
                    "越明年，政通人和，百廢具興。", 
                    "乃重修岳陽樓，增其舊制，", 
                    "刻唐賢今人詩賦於其上，", 
                    "屬予作文以記之。", 
                    "予觀夫巴陵勝狀，在洞庭一湖。", 
                    "銜遠山，吞長江，浩浩湯湯，橫無際涯；", 
                    "朝暉夕陰，氣象萬千。", 
                    "此則岳陽樓之大觀也，前人之述備矣。", 
                    "然則北通巫峽，南極瀟湘，", 
                    "遷客騷人，多會於此，", 
                    "覽物之情，得無異乎？", 
                    "若夫霪雨霏霏，連月不開；", 
                    "陰風怒號，濁浪排空；", 
                    "日星隱曜，山岳潛形；", 
                    "商旅不行，檣傾楫摧；", 
                    "薄暮冥冥，虎嘯猿啼。", 
                    "登斯樓也，則有去國懷鄉，憂讒畏譏，", 
                    "滿目蕭然，感極而悲者矣。", 
                    "至若春和景明，波瀾不驚，上下天光，一碧萬頃；", 
                    "沙鷗翔集，錦鱗游泳，", 
                    "岸芷汀蘭，郁郁青青。", 
                    "而或長煙一空，皓月千里，", 
                    "浮光躍金，靜影沉璧；", 
                    "漁歌互答，此樂何極！", 
                    "登斯樓也，則有心曠神怡，寵辱皆忘，", 
                    "把酒臨風，其喜洋洋者矣。", 
                    "嗟夫！予嘗求古仁人之心，或異二者之為。", 
                    "何哉？不以物喜，不以己悲。", 
                    "居廟堂之高，則憂其民；處江湖之遠，則憂其君。", 
                    "是進亦憂，退亦憂，然則何時而樂耶？", 
                    "其必曰：「先天下之憂而憂，後天下之樂而樂」乎！", 
                    "噫！微斯人，吾誰與歸？"
                ] 
            }
        };

        const placeholderImg = "data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%25%22%20height%3D%22100%25%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23eee%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2220%22%20font-weight%3D%22bold%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%20fill%3D%22%23555%22%3E%E8%BC%89%E5%85%A5%E4%B8%AD...%3C%2Ftext%3E%3C%2Fsvg%3E";
        const errorImgSafe = "data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%25%22%20height%3D%22100%25%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23eee%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2220%22%20font-weight%3D%22bold%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%20fill%3D%22%23555%22%3E%E5%9C%96%E7%89%87%E8%BC%89%E5%85%A5%E5%A4%B1%E6%95%97%3C%2Ftext%3E%3C%2Fsvg%3E";

        let currentComicKey = null;

        const catalogView = document.getElementById('catalog-view');
        const readerView = document.getElementById('reader-view');
        const bookElement = document.getElementById('book');
        const btnBack = document.getElementById('btn-back');
        const pageInput = document.getElementById('page-input');
        const totalPagesSpan = document.getElementById('total-pages');
        const loading = document.getElementById('loading');

        // IndexedDB 圖片緩存
        const DB_NAME = "DSEComicDB";
        const STORE_NAME = "ImageCache";
        const sessionBlobUrls = new Map();

        const dbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: "url" });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });

        async function getCachedImageURL(url) {
            if (sessionBlobUrls.has(url)) return sessionBlobUrls.get(url);
            try {
                const db = await dbPromise;
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const cached = await new Promise((resolve, reject) => {
                    const req = store.get(url);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
                if (cached && cached.blob) {
                    const objUrl = URL.createObjectURL(cached.blob);
                    sessionBlobUrls.set(url, objUrl);
                    return objUrl;
                }
                const response = await fetch(url, { mode: 'cors' });
                if (!response.ok) throw new Error("Network response not ok");
                const blob = await response.blob();
                const txWrite = db.transaction(STORE_NAME, "readwrite");
                txWrite.objectStore(STORE_NAME).put({ url, blob });
                const objUrl = URL.createObjectURL(blob);
                sessionBlobUrls.set(url, objUrl);
                return objUrl;
            } catch (error) {
                return url; 
            }
        }

        async function getFileMap(folderId, folder) {
            const cacheKey = `dse_comic_map_${folderId || folder}`;
            const localData = localStorage.getItem(cacheKey);
            let parsedData = null;
            if (localData) { try { parsedData = JSON.parse(localData); } catch(e){} }

            const fetchPromise = fetch(`${GAS_URL}?folderId=${encodeURIComponent(folderId || "")}&folder=${encodeURIComponent(folder || "")}`)
                .then(res => res.json())
                .then(fileMap => {
                    if (!fileMap.error) localStorage.setItem(cacheKey, JSON.stringify(fileMap));
                    return fileMap;
                }).catch(e => { return { error: "Network error" }; });
            return parsedData || await fetchPromise;
        }

        // ==========================================
        // UI 生成與操控
        // ==========================================
        function renderCatalog() {
            catalogView.innerHTML = '';
            for (const[key, data] of Object.entries(comicDatabase)) {
                const isAvailable = data.totalPages > 0;
                const card = document.createElement('div');
                card.className = `comic-card ${isAvailable ? '' : 'disabled'}`;
                
                const badgeHtml = isAvailable ? `<div class="badge">${data.totalPages} 頁</div>` : `<div class="badge coming-soon">敬請期待</div>`;
                const imgId = `cover-img-${key}`; 

                card.innerHTML = `
                    ${badgeHtml}
                    <div class="comic-cover">
                        <img id="${imgId}" src="${placeholderImg}" alt="${data.title} 封面">
                    </div>
                    <div class="comic-info">
                        <h3 class="comic-title">${data.title}</h3>
                        <div class="comic-meta">${data.author}</div>
                    </div>
                `;

                if (isAvailable) {
                    card.onclick = () => loadComic(key);
                    fetchCoverImage(data.folderId, data.folder, imgId);
                }
                catalogView.appendChild(card);
            }
        }

        async function fetchCoverImage(folderId, folder, imgId) {
            try {
                const fileMap = await getFileMap(folderId, folder);
                if (!fileMap.error) {
                    const coverKey = Object.keys(fileMap).find(name => parseInt(name.match(/\d+/) || [-1], 10) === 0);
                    if (coverKey) {
                        const driveUrl = `https://drive.google.com/thumbnail?id=${fileMap[coverKey]}&sz=w600`;
                        const localUrl = await getCachedImageURL(driveUrl);
                        const imgEl = document.getElementById(imgId);
                        if(imgEl) imgEl.src = localUrl;
                    }
                }
            } catch (e) { console.warn("載入封面失敗:", e); }
        }

        function showCatalog() {
            readerView.style.display = 'none';
            btnBack.style.display = 'none';
            catalogView.style.display = 'grid';
            bookElement.innerHTML = '';
            currentComicKey = null;
            document.getElementById('search-input').value = '';
            document.getElementById('search-results').style.display = 'none';
            window.scrollTo(0, 0);
        }

        btnBack.addEventListener('click', showCatalog);

        function showReaderView() {
            catalogView.style.display = 'none';
            btnBack.style.display = 'block';
            readerView.style.display = 'flex';
        }

        async function loadComic(comicKey) {
            const data = comicDatabase[comicKey];
            if (!data || data.totalPages === 0) return;

            currentComicKey = comicKey;
            showReaderView();
            loading.style.display = 'block';
            bookElement.style.display = 'none';

            try {
                const fileMap = await getFileMap(data.folderId, data.folder);
                if (fileMap.error) {
                    alert("獲取檔案失敗：" + fileMap.error);
                    showCatalog();
                    loading.style.display = 'none';
                    return;
                }

                let filesArray = Object.keys(fileMap)
                    .map(name => ({ name: name, id: fileMap[name] }))
                    .filter(file => parseInt(file.name.match(/\d+/) || [-1], 10) !== 0);

                filesArray.sort((a, b) => parseInt(a.name.match(/\d+/) || [0], 10) - parseInt(b.name.match(/\d+/) || [0], 10));

                let pagesHTML = '';
                for (let i = 1; i <= data.totalPages; i++) {
                    const imgId = `page-img-${comicKey}-${i}`;
                    const pageId = `page-${comicKey}-${i}`;
                    const pageText = (data.texts && data.texts[i - 1]) ? data.texts[i - 1] : '';
                    const textDiv = pageText ? `<div class="page-text">${pageText}</div>` : '';

                    pagesHTML += `
                        <div class="page" id="${pageId}" data-page="${i}">
                            <div class="page-content">
                                <img id="${imgId}" src="${placeholderImg}" alt="第${i}頁" 
                                     onerror="this.onerror=null; this.src='${errorImgSafe}'" 
                                     onclick="openLightbox(this.src)">
                                ${textDiv}
                            </div>
                        </div>
                    `;
                }
                
                bookElement.innerHTML = pagesHTML;
                updatePageInfo(1);
                
                loading.style.display = 'none';
                bookElement.style.display = 'flex';

                // 非同步載入原圖
                const activeKey = currentComicKey;
                for (let i = 1; i <= data.totalPages; i++) {
                    const file = filesArray[i - 1]; 
                    if (file && file.id) {
                        const driveUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1500`;
                        getCachedImageURL(driveUrl).then(localUrl => {
                            if (activeKey !== currentComicKey) return; 
                            const imgEl = document.getElementById(`page-img-${comicKey}-${i}`);
                            if (imgEl) imgEl.src = localUrl;
                        });
                    }
                }

            } catch (error) {
                console.error(error);
                alert("無法連接伺服器或網絡中斷。");
                showCatalog();
                loading.style.display = 'none';
            }
        }

        // ==========================================
        // 全文搜尋與跳轉功能
        // ==========================================
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            searchResults.innerHTML = '';
            if (!query) {
                searchResults.style.display = 'none';
                return;
            }
            
            let results = [];
            for (const [key, data] of Object.entries(comicDatabase)) {
                if (!data.texts) continue;
                data.texts.forEach((text, index) => {
                    if (text.toLowerCase().includes(query)) {
                        results.push({ comicKey: key, comicTitle: data.title, page: index + 1, text: text });
                    }
                });
            }
            
            if (results.length > 0) {
                results.slice(0, 15).forEach(res => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const highlightedText = res.text.replace(new RegExp(safeQuery, 'gi'), match => `<span class="highlight">${match}</span>`);
                    
                    div.innerHTML = `<strong>${res.comicTitle} (第 ${res.page} 頁)</strong>${highlightedText}`;
                    div.onclick = () => {
                        searchInput.value = '';
                        searchResults.style.display = 'none';
                        jumpToSearch(res.comicKey, res.page);
                    };
                    searchResults.appendChild(div);
                });
            } else {
                searchResults.innerHTML = '<div class="search-item" style="cursor:default;">找不到相關內容...</div>';
            }
            searchResults.style.display = 'block';
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-container')) {
                searchResults.style.display = 'none';
            }
        });

        async function jumpToSearch(comicKey, pageNumber) {
            if (currentComicKey !== comicKey) {
                await loadComic(comicKey);
            } else {
                showReaderView();
            }
            
            requestAnimationFrame(() => {
                setTimeout(() => {
                    scrollToPage(pageNumber);
                    
                    // 黃色螢光筆提示動畫
                    const targetPage = document.getElementById(`page-${comicKey}-${pageNumber}`);
                    if (targetPage) {
                        const textEl = targetPage.querySelector('.page-text');
                        if (textEl) {
                            textEl.style.transition = 'background-color 0.2s';
                            textEl.style.backgroundColor = 'var(--comic-yellow)';
                            setTimeout(() => {
                                textEl.style.transition = 'background-color 2s';
                                textEl.style.backgroundColor = 'var(--comic-white)';
                            }, 2500);
                        }
                    }
                }, 100);
            });
        }

        // ==========================================
        // 頁碼更新與滾動監聽
        // ==========================================
        function updatePageInfo(currentPage) {
            if (!currentComicKey) return;
            const currentComic = comicDatabase[currentComicKey];
            pageInput.value = currentPage;
            pageInput.max = currentComic.totalPages;
            totalPagesSpan.textContent = currentComic.totalPages;
        }

        function scrollToPage(pageNum) {
            const targetPage = document.getElementById(`page-${currentComicKey}-${pageNum}`);
            if (targetPage) {
                targetPage.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 監聽滾動事件，自動更新底部所在頁碼
        window.addEventListener('scroll', () => {
            if (readerView.style.display !== 'flex') return;
            
            let closestPage = 1;
            let minDistance = Infinity;
            
            document.querySelectorAll('.page').forEach(page => {
                const rect = page.getBoundingClientRect();
                const distance = Math.abs((rect.top + rect.height / 2) - (window.innerHeight / 2));
                if (distance < minDistance) {
                    minDistance = distance;
                    closestPage = parseInt(page.getAttribute('data-page'), 10);
                }
            });
            
            if (parseInt(pageInput.value, 10) !== closestPage) {
                 updatePageInfo(closestPage);
            }
        }, { passive: true });

        // 底部按鈕與輸入框控制
        document.getElementById('btn-prev').addEventListener('click', () => { 
            const current = parseInt(pageInput.value, 10);
            if(current > 1) scrollToPage(current - 1);
        });
        
        document.getElementById('btn-next').addEventListener('click', () => { 
            const current = parseInt(pageInput.value, 10);
            const max = parseInt(pageInput.max, 10);
            if(current < max) scrollToPage(current + 1);
        });

        pageInput.addEventListener('change', (e) => {
            let targetPage = parseInt(e.target.value, 10);
            const maxPage = parseInt(pageInput.max, 10);
            if (isNaN(targetPage) || targetPage < 1) targetPage = 1;
            else if (targetPage > maxPage) targetPage = maxPage;
            pageInput.value = targetPage;
            scrollToPage(targetPage);
        });

        pageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') pageInput.blur(); });
        pageInput.addEventListener('focus', () => { pageInput.select(); });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });

        // ==========================================
        // 圖片放大功能
        // ==========================================
        function openLightbox(imgSrc) {
            if(imgSrc.includes('data:image/svg+xml')) return; 
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = imgSrc;
            lightbox.style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        // 啟動程式
        window.addEventListener('DOMContentLoaded', () => { renderCatalog(); });
    </script>
</body>
