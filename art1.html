<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE_ART // Integrated Platform</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161a;
            --accent: #00ff9d;
            --text: #e0e0e0;
            --code-bg: #1e1e24;
            --border: #333;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: grid;
            grid-template-columns: 250px 1fr 350px;
            grid-template-rows: 1fr 200px;
            height: 100vh;
            gap: 2px;
            background: var(--border);
        }

        /* Sidebar */
        aside {
            grid-row: 1 / 3;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        h1 { font-size: 1.2rem; color: var(--accent); margin-bottom: 20px; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        
        .nav-item {
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-item:hover { background: #222; border-color: var(--accent); }
        .nav-item.active { background: var(--accent); color: black; font-weight: bold; }

        /* Main Viewport */
        main {
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas { max-width: 100%; max-height: 100%; }

        /* Code Panel */
        #code-panel {
            grid-column: 3;
            grid-row: 1 / 3;
            background: var(--code-bg);
            padding: 15px;
            font-size: 12px;
            overflow: auto;
            white-space: pre-wrap;
            border-left: 1px solid var(--border);
        }

        .code-header { color: var(--accent); margin-bottom: 10px; font-weight: bold; font-size: 14px; }

        /* Console Panel */
        #console {
            grid-column: 2;
            grid-row: 2;
            background: var(--panel);
            padding: 15px;
            font-size: 12px;
            overflow-y: auto;
            color: #aaa;
            border-top: 1px solid var(--border);
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid #444; padding-left: 8px; }
        .log-info { color: #00d4ff; }

        /* UI elements */
        .badge {
            font-size: 10px;
            background: #444;
            padding: 2px 5px;
            border-radius: 3px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div id="app">
    <aside id="sidebar">
        <h1>ART_OF_CODE v1.0</h1>
        <div id="menu"></div>
    </aside>

    <main id="viewport">
        <canvas id="stage"></canvas>
    </main>

    <div id="code-panel">
        <div class="code-header">// SOURCE_CODE</div>
        <code id="code-display"></code>
    </div>

    <div id="console">
        <div class="log-entry log-info">System initialized. Select an exhibit to execute.</div>
    </div>
</div>

<script>
/** 
 * EXHIBITS DATABASE
 * Each exhibit contains metadata and a core execution function.
 */
const Exhibits = [
    {
        name: "Matrix Rain",
        description: "Classic digital rain simulation.",
        code: function(ctx, w, h) {
            const columns = Math.floor(w / 20);
            const drops = Array(columns).fill(1);
            return function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = "#0F0";
                ctx.font = "15px monospace";
                for(let i = 0; i < drops.length; i++) {
                    const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                    ctx.fillText(text, i * 20, drops[i] * 20);
                    if(drops[i] * 20 > h && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            };
        }
    },
    {
        name: "Fractal Tree",
        description: "Recursive branching algorithm.",
        code: function(ctx, w, h) {
            let angle = 0;
            return function draw() {
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, w, h);
                ctx.save();
                ctx.strokeStyle = "#00ff9d";
                ctx.translate(w/2, h);
                angle = Math.sin(Date.now() * 0.001) * 0.5 + 0.5;
                branch(100);
                ctx.restore();

                function branch(len) {
                    ctx.beginPath();
                    ctx.moveTo(0,0);
                    ctx.lineTo(0, -len);
                    ctx.stroke();
                    ctx.translate(0, -len);
                    if (len > 4) {
                        ctx.save(); ctx.rotate(angle); branch(len * 0.67); ctx.restore();
                        ctx.save(); ctx.rotate(-angle); branch(len * 0.67); ctx.restore();
                    }
                }
            };
        }
    },
    {
        name: "Particle Swarm",
        description: "Autonomous agents with friction and gravity.",
        code: function(ctx, w, h) {
            const pts = Array.from({length: 100}, () => ({
                x: Math.random()*w, y: Math.random()*h,
                vx: Math.random()*4-2, vy: Math.random()*4-2
            }));
            return function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = "#fff";
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > w) p.vx *= -1;
                    if(p.y < 0 || p.y > h) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                    ctx.fill();
                    // Connect lines
                    pts.forEach(p2 => {
                        let d = Math.hypot(p.x-p2.x, p.y-p2.y);
                        if(d < 100) {
                            ctx.strokeStyle = `rgba(0,255,157,${1 - d/100})`;
                            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                        }
                    });
                });
            };
        }
    },
    {
        name: "Mandelbrot Set",
        description: "Visualizing the infinite boundary of complex numbers.",
        code: function(ctx, w, h) {
            const maxIter = 50;
            const zoom = 200;
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,w,h);
            for(let x=0; x<w; x++) {
                for(let y=0; y<h; y++) {
                    let c_re = (x - w/2) / zoom;
                    let c_im = (y - h/2) / zoom;
                    let re = 0, im = 0;
                    let iter = 0;
                    while(re*re + im*im <= 4 && iter < maxIter) {
                        let next_re = re*re - im*im + c_re;
                        im = 2*re*im + c_im;
                        re = next_re;
                        iter++;
                    }
                    if(iter < maxIter) {
                        ctx.fillStyle = `hsl(${iter * 5}, 100%, 50%)`;
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            return null; // Static render
        }
    },
    {
        name: "Game of Life",
        description: "Conway's cellular automata.",
        code: function(ctx, w, h) {
            const res = 10;
            const cols = Math.floor(w/res);
            const rows = Math.floor(h/res);
            let grid = Array.from({length: cols}, () => Array.from({length: rows}, () => Math.random() > 0.8 ? 1 : 0));
            
            return function draw() {
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,w,h);
                let next = grid.map(arr => [...arr]);
                for(let i=0; i<cols; i++) {
                    for(let j=0; j<rows; j++) {
                        let neighbors = 0;
                        for(let x=-1; x<=1; x++) {
                            for(let y=-1; y<=1; y++) {
                                if(x===0 && y===0) continue;
                                let ni = (i+x+cols)%cols;
                                let nj = (j+y+rows)%rows;
                                neighbors += grid[ni][nj];
                            }
                        }
                        if(grid[i][j] === 1 && (neighbors < 2 || neighbors > 3)) next[i][j] = 0;
                        else if(grid[i][j] === 0 && neighbors === 3) next[i][j] = 1;
                        if(grid[i][j]) {
                            ctx.fillStyle = "#00ff9d";
                            ctx.fillRect(i*res, j*res, res-1, res-1);
                        }
                    }
                }
                grid = next;
            };
        }
    },
    {
        name: "Sine Ribbon",
        description: "Trigonometric interference patterns.",
        code: function(ctx, w, h) {
            let t = 0;
            return function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)";
                ctx.fillRect(0,0,w,h);
                ctx.beginPath();
                ctx.strokeStyle = `hsl(${t%360}, 100%, 50%)`;
                for(let x=0; x<w; x++) {
                    let y = h/2 + Math.sin(x*0.01 + t*0.05) * 100 * Math.sin(t*0.02);
                    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.stroke();
                t++;
            };
        }
    },
    {
        name: "Starfield",
        description: "3D perspective projection simulation.",
        code: function(ctx, w, h) {
            const stars = Array.from({length: 400}, () => ({
                x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w
            }));
            return function draw() {
                ctx.fillStyle = "black"; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = "white";
                stars.forEach(s => {
                    s.z -= 5;
                    if(s.z <= 0) s.z = w;
                    let sx = (s.x / s.z) * (w/2) + w/2;
                    let sy = (s.y / s.z) * (h/2) + h/2;
                    let size = (1 - s.z/w) * 3;
                    ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI*2); ctx.fill();
                });
            };
        }
    },
    {
        name: "Sorting Visual",
        description: "Visualizing the chaos of a Bubble Sort.",
        code: function(ctx, w, h) {
            const count = 100;
            const vals = Array.from({length: count}, () => Math.random() * h);
            let i = 0, j = 0;
            return function draw() {
                ctx.fillStyle = "black"; ctx.fillRect(0,0,w,h);
                for(let k=0; k<5; k++) { // Speed up logic
                    if(i < vals.length) {
                        if(vals[j] > vals[j+1]) [vals[j], vals[j+1]] = [vals[j+1], vals[j]];
                        j++;
                        if(j >= vals.length - i - 1) { j=0; i++; }
                    }
                }
                vals.forEach((v, idx) => {
                    ctx.fillStyle = idx === j ? "#ff0000" : "#00ff9d";
                    ctx.fillRect(idx * (w/count), h-v, (w/count)-1, v);
                });
            };
        }
    },
    {
        name: "Attractor",
        description: "Strange attractor - Chaos theory physics.",
        code: function(ctx, w, h) {
            let x = 0.1, y = 0, z = 0;
            let a = 10, b = 28, c = 8/3;
            ctx.fillStyle = "black"; ctx.fillRect(0,0,w,h);
            return function draw() {
                for(let i=0; i<20; i++) {
                    let dx = a * (y - x);
                    let dy = x * (b - z) - y;
                    let dz = x * y - c * z;
                    x += dx * 0.01; y += dy * 0.01; z += dz * 0.01;
                    ctx.fillStyle = `hsl(${(z*5)%360}, 100%, 50%)`;
                    ctx.fillRect(w/2 + x*10, h/2 + y*10, 1, 1);
                }
            };
        }
    },
    {
        name: "Geometric Web",
        description: "Rotational symmetry and math art.",
        code: function(ctx, w, h) {
            let rotation = 0;
            return function draw() {
                ctx.fillStyle = "rgba(0,0,0,0.05)";
                ctx.fillRect(0,0,w,h);
                ctx.translate(w/2, h/2);
                ctx.rotate(rotation);
                for(let i=0; i<8; i++) {
                    ctx.rotate(Math.PI/4);
                    ctx.strokeStyle = "#00ff9d";
                    ctx.strokeRect(Math.sin(rotation)*50, Math.cos(rotation)*50, 100, 100);
                }
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                rotation += 0.01;
            };
        }
    }
];

/**
 * ENGINE LOGIC
 */
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const codeDisplay = document.getElementById('code-display');
const consolePanel = document.getElementById('console');

let currentAnimation = null;

function log(msg, type = 'info') {
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
    consolePanel.appendChild(div);
    consolePanel.scrollTop = consolePanel.scrollHeight;
}

function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
}

function loadExhibit(index) {
    const ex = Exhibits[index];
    log(`Loading exhibit: ${ex.name}...`);
    
    // UI Update
    document.querySelectorAll('.nav-item').forEach((el, i) => {
        el.className = i === index ? 'nav-item active' : 'nav-item';
    });

    // Code display
    codeDisplay.textContent = ex.code.toString();

    // Reset Canvas and Animation
    if (currentAnimation) cancelAnimationFrame(currentAnimation);
    resize();
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Get the draw loop
    const loop = ex.code(ctx, canvas.width, canvas.height);
    
    if (loop) {
        function animate() {
            loop();
            currentAnimation = requestAnimationFrame(animate);
        }
        animate();
        log(`Routine started.`);
    } else {
        log(`Static render completed.`);
    }
}

// Init Menu
Exhibits.forEach((ex, i) => {
    const btn = document.createElement('div');
    btn.className = 'nav-item';
    btn.innerHTML = `<span class="badge">0${i+1}</span> ${ex.name}`;
    btn.onclick = () => loadExhibit(i);
    menu.appendChild(btn);
});

window.addEventListener('resize', resize);
// Start with first exhibit
loadExhibit(0);

</script>
</body>
</html>
