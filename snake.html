
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wabi-Sabi Snake</title>
    <style>
        :root {
            --bg-color: #f5f2eb; /* Rice paper */
            --board-color: #e8e4d9; /* Aged parchment */
            --text-color: #4a443c; /* Faded sumi ink */
            --snake-head: #4a5d23; /* Deep matcha */
            --snake-body: #738654; /* Faded matcha */
            --food-color: #c15c3d; /* Persimmon */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* Subtle noise texture for an organic feel */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: var(--board-color);
            border-radius: 8px; /* Slight rounding, avoiding harsh perfect corners */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02), 
                        0 10px 30px rgba(0,0,0,0.05);
            touch-action: none; /* Crucial for swipe controls */
            width: 100%;
            height: 100%;
            display: block;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: normal;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .score-board {
            font-size: 1rem;
            font-style: italic;
            opacity: 0.7;
        }

        /* Overlays for UI */
        .overlay {
            position: absolute;
            top: 20px; 
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: rgba(245, 242, 235, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-style: italic;
            color: var(--text-color);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 10px 24px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
            opacity: 1;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        @media (max-width: 500px) {
            #game-container {
                padding: 10px;
            }
            .overlay {
                top: 10px; left: 10px; right: 10px; bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Snake</h1>
        <div class="score-board">
            Score: <span id="score">0</span>
        </div>
    </header>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Start Screen -->
        <div id="startScreen" class="overlay">
            <div class="message">Embrace the journey.</div>
            <button class="btn" id="startBtn">Begin</button>
            <div class="instructions">Swipe or use arrow keys to guide.</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="overlay hidden">
            <div class="message">The cycle ends.<br><br>Length: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">Return</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Game Constants & State
        const gridSize = 20; // 20x20 grid
        let tileCount;
        let tileSize;
        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoopTimeout;
        let changingDirection = false;
        let isPlaying = false;
        let breathTime = 0; // For organic food animation

        // Colors
        const style = getComputedStyle(document.body);
        const colorSnakeHead = style.getPropertyValue('--snake-head').trim();
        const colorSnakeBody = style.getPropertyValue('--snake-body').trim();
        const colorFood = style.getPropertyValue('--food-color').trim();

        function initCanvas() {
            // Make canvas crisp on high DPI screens
            const rect = canvas.parentElement.getBoundingClientRect();
            // We want a square, so take the smaller dimension (accounting for padding)
            const size = Math.min(rect.width - 40, rect.height - 40); 
            
            // Set internal drawing resolution
            const dpr = window.devicePixelRatio || 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            
            // Normalize coordinate system to use css pixels
            ctx.scale(dpr, dpr);
            
            tileCount = gridSize;
            tileSize = size / tileCount;
        }

        window.addEventListener('resize', () => {
            if (!isPlaying) initCanvas();
        });

        function resetGame() {
            initCanvas();
            // Start in the middle
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 1, y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 2, y: Math.floor(tileCount / 2) }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            changingDirection = false;
            placeFood();
        }

        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            resetGame();
            isPlaying = true;
            main();
        }

        function gameOver() {
            isPlaying = false;
            clearTimeout(gameLoopTimeout);
            finalScoreElement.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        function main() {
            if (!isPlaying) return;

            if (hasGameEnded()) {
                gameOver();
                return;
            }

            changingDirection = false;
            
            // The timeout creates the tick rate. Slower = more relaxed wabi-sabi feel.
            gameLoopTimeout = setTimeout(() => {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                breathTime += 0.1;
                main();
            }, 120); // 120ms per tick
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            if (snake.length === 0) return;

            // Draw a continuous organic path instead of rigid blocks
            ctx.beginPath();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = tileSize * 0.8; // Slightly smaller than tile to show gaps if coiled

            // Draw body path
            ctx.strokeStyle = colorSnakeBody;
            for (let i = 0; i < snake.length; i++) {
                const px = snake[i].x * tileSize + tileSize / 2;
                const py = snake[i].y * tileSize + tileSize / 2;
                
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.stroke();

            // Emphasize the head slightly
            const headX = snake[0].x * tileSize + tileSize / 2;
            const headY = snake[0].y * tileSize + tileSize / 2;
            
            ctx.beginPath();
            ctx.fillStyle = colorSnakeHead;
            ctx.arc(headX, headY, tileSize * 0.45, 0, Math.PI * 2);
            ctx.fill();
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head

            // Check if food eaten
            if (head.x === food.x && head.y === food.y) {
                score += 1;
                scoreElement.innerText = score;
                placeFood();
            } else {
                snake.pop(); // Remove tail
            }
        }

        function drawFood() {
            const px = food.x * tileSize + tileSize / 2;
            const py = food.y * tileSize + tileSize / 2;
            
            // Organic pulsing effect for food (impermanence/life)
            const breath = Math.sin(breathTime) * (tileSize * 0.08);
            const radius = (tileSize * 0.35) + breath;

            ctx.beginPath();
            ctx.fillStyle = colorFood;
            // Draw an imperfect circle/drop
            ctx.arc(px, py, Math.max(2, radius), 0, Math.PI * 2);
            ctx.fill();
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Prevent food spawning on the snake
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == food.x && part.y == food.y) {
                    placeFood();
                }
            });
        }

        function hasGameEnded() {
            const head = snake[0];
            
            // Wall collision (Strict walls)
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }

            // Self collision
            for (let i = 4; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        // --- Controls ---

        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;
            const W_KEY = 87;
            const A_KEY = 65;
            const S_KEY = 83;
            const D_KEY = 68;

            if (changingDirection) return;
            
            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT_KEY || keyPressed === A_KEY) && !goingRight) {
                dx = -1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === UP_KEY || keyPressed === W_KEY) && !goingDown) {
                dx = 0; dy = -1; changingDirection = true;
            }
            if ((keyPressed === RIGHT_KEY || keyPressed === D_KEY) && !goingLeft) {
                dx = 1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === DOWN_KEY || keyPressed === S_KEY) && !goingUp) {
                dx = 0; dy = 1; changingDirection = true;
            }
        }

        document.addEventListener("keydown", changeDirection);

        // --- Touch / Swipe Controls ---
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        canvas.addEventListener('touchmove', function(e) {
            // Prevent scrolling when swiping on canvas
            e.preventDefault(); 
        }, {passive: false});

        canvas.addEventListener('touchend', function(e) {
            if (changingDirection) return;

            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: true});

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;
            
            // Threshold to ensure it's an intentional swipe, not a tap
            if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal swipe
                if (diffX > 0 && !goingLeft) {
                    dx = 1; dy = 0; changingDirection = true; // Right
                } else if (diffX < 0 && !goingRight) {
                    dx = -1; dy = 0; changingDirection = true; // Left
                }
            } else {
                // Vertical swipe
                if (diffY > 0 && !goingUp) {
                    dx = 0; dy = 1; changingDirection = true; // Down
                } else if (diffY < 0 && !goingDown) {
                    dx = 0; dy = -1; changingDirection = true; // Up
                }
            }
        }

        // Button Listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Init setup on load
        initCanvas();
        // Draw initial static background state
        ctx.fillStyle = colorSnakeBody;
        ctx.font = "italic 16px Georgia";
        ctx.textAlign = "center";
        // Let the overlay handle the visual instructions

    </script>
</body>
</html>
